<!DOCTYPE html>
<html>
<head>
<title>SAFEWAY Vehicle Monitoring</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

h2{
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>SAFEWAY Vehicle Blackbox System</h1>

<div class="container">

<div class="box">
<h2>Violations</h2>
<div id="violations"></div>
</div>

<div class="box">
<h2>Emergency Events</h2>
<div id="emergency"></div>
</div>

<div class="box">
<h2>Vehicle Camera</h2>
<img src="https://placehold.co/400x250" width="100%">
</div>

<div class="box">
<h2>Test Notification</h2>
<button onclick="notify()">Send Test Alert</button>
</div>

</div>

<script>

Notification.requestPermission();

function notify(){
new Notification("SAFEWAY ALERT",{
body:"Violation detected"
});
}

async function loadViolations(){

const res = await fetch("/log");
const data = await res.json();

let html="";

data.reverse().forEach(v=>{

html += `
<div style="border-bottom:1px solid #ccc;padding:10px">
<b>${v.vehicleNo}</b><br>
${v.violationType}<br>
Fine ₹${v.fine}
</div>
`;

});

document.getElementById("violations").innerHTML = html;

}

loadViolations();

</script>

</body>
</html>
